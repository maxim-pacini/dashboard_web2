<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
</head>
<body id="body">
    
    <header class="header">
        <div class="name-page">
            <p>Dashboard jQuery</p>
        </div>
        <div class="button-page">
            <button class="btn">
                <div class="icone">
                    <span class="barre"></span>
                    <span class="barre"></span>
                    <span class="barre"></span>
                </div>
                Menu
            </button>
            <button class="btn" id="dark">🌙Dark mode</button>
        </div>
    </header>
    <main>
        <section class="section">
            <button class="card" id="btn1">
                <h2>Carte 1</h2>
                <p>Animation jQuery</p>
            </button>
            <button class="card" id="btn2">
                <h2>Carte 2</h2>
                <p>Manipulation DOM</p>
            </button>
            <button class="card" id="btn3">
                <h2>Carte 3</h2>
                <p>Effets visuels</p>
            </button>
        </section>
        <section class="section2">
            <h1>Contrôles</h1>
            <div class="btncontainer">
                <button class="btnmove" id="start">Lancer animation</button>
                <button class="btnmove" id="stop">Stop animation</button>
                <button class="btnmove" id="hide">Masquer galerie</button>
                <button class="btnmove" id="show">Afficher galerie</button>
            </div>
            <div class="cubecontainer" id="cubecontainer">
                <span class="cube red" id="cube"></span>
                <span class="cube blue" id="rond"></span>
                <span class="cube green"></span>
                <span class="cube purple" id="cubemauve"></span>
            </div>
        </section>
        <section class="section3">
            <button class="btn" id="affich">Afficher Notifications</button>
            <p class="notif" id="notif">🔔 Voici la notiffication affichée</p>
        
            <div class="interface">
                <h2>Manipulation attr()</h2>
                <form action="">
                    <label for="nom"></label>
                    <input type="tex" id="nom" name="nom" placeholder="Votre nom">
                </form>
                <div class="onoff">
                    <button class="btn" id="disable">Disable</button>
                    <button class="btn" id="enable">Enable</button>
                </div>
                
            </div>
        </section>


    </main>
    










    





    <script src="new.js"></script>
</body>
</html>
