<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>BLOC 1 — Authentification & Regex</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>

<!-- ============================================================
     ZONE D'AUTHENTIFICATION
============================================================ -->
<div id="authBox" class="auth-box">

    <h1>jQuery Academy</h1>
    <p class="sub">Crée ton compte pour accéder au dashboard.</p>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" data-form="signupForm">Inscription</button>
        <button class="tab"        data-form="loginForm">Connexion</button>
    </div>


    <!-- ==============================
         FORMULAIRE INSCRIPTION
    ============================== -->
    <div id="signupForm">

        <!-- Champ username -->
        <div class="field" id="f-username">
            <label for="signup-username">Nom d'utilisateur</label>
            <input type="text" id="signup-username"
                   placeholder="ex: jean_dev"
                   autocomplete="off">
            <div class="hint">3 à 16 caractères : lettres, chiffres, _ ou -</div>
        </div>

        <!-- Champ email -->
        <div class="field" id="f-email">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email"
                   placeholder="prenom@domaine.com"
                   autocomplete="off">
            <div class="hint">Format email standard requis</div>
        </div>

        <!-- Champ password -->
        <div class="field" id="f-password">
            <label for="signup-password">Mot de passe</label>
            <input type="password" id="signup-password"
                   placeholder="••••••••"
                   autocomplete="off">
            <div class="hint">8+ caractères, 1 majuscule, 1 chiffre, 1 spécial</div>
            <!-- Jauge de force -->
            <div class="strength">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <button class="submit-btn" id="signupBtn">Créer le compte →</button>

        <div class="flash" id="signupFlash"></div>

    </div>


    <!-- ==============================
         FORMULAIRE CONNEXION
    ============================== -->
    <div id="loginForm" style="display:none">

        <div class="field" id="f-login-email">
            <label for="login-email">Email</label>
            <input type="email" id="login-email"
                   placeholder="prenom@domaine.com"
                   autocomplete="off">
            <div class="hint">&nbsp;</div>
        </div>

        <div class="field" id="f-login-password">
            <label for="login-password">Mot de passe</label>
            <input type="password" id="login-password"
                   placeholder="••••••••"
                   autocomplete="off">
            <div class="hint">&nbsp;</div>
        </div>

        <button class="submit-btn" id="loginBtn">Se connecter →</button>

        <div class="flash" id="loginFlash"></div>

    </div>

</div>


<!-- ============================================================
     PAGE D'ACCUEIL (après connexion)
============================================================ -->
<div id="welcome" class="auth-box">
    <h2>Bienvenue 🎉</h2>
    <p id="welcomeMsg">Connexion réussie !</p>
    <button class="logout" id="logoutBtn">Se déconnecter</button>
</div>


<script>
/* ============================================================
   MÉMOIRE DU PROGRAMME
   On crée deux "boîtes" pour stocker des informations.
   - registeredUser : contiendra les infos du compte créé (nom, email, mot de passe)
   - isLoggedIn : dira si quelqu'un est connecté ou pas
   Au départ, les boîtes sont vides (null = vide, false = non)
============================================================ */
let registeredUser = null; // { username, email, password }
let isLoggedIn = false;


/* ============================================================
   LES RÈGLES DE VÉRIFICATION
   On définit ici les règles qui disent si ce que l'utilisateur
   a tapé est correct ou pas. Par exemple, un email doit contenir
   un "@" et un ".", un mot de passe doit être assez long, etc.
============================================================ */
    // TODO 1 — Regex username
    // Règle : entre 3 et 16 caractères
    //         uniquement lettres (a-z, A-Z), chiffres, underscore _ ou tiret -
    // Indice : ^ = début, $ = fin, [groupe]{min,max}

const REGEX = {

    // Règle pour le nom d'utilisateur :
    // doit avoir entre 3 et 16 caractères,
    // uniquement des lettres, des chiffres, _ ou -
    username: /^[a-zA-Z0-9_-]{3,16}$/,

    // TODO 2 — Regex email
    // Règle : qqch @ qqch . qqch (au moins 2 lettres pour le domaine)
    // Indice : \. pour un vrai point, + = un ou plusieurs, {2,} = au moins 2
    // Règle pour l'email :

    // doit ressembler à quelquechose@quelquechose.fr (ou .com, etc.)
    // email: /^[^\s@]+@[^\s@]+\.[A-Za-z]{2,}$/,
    email: /^[a-zA-Z0-p]+@[a-zA-Z]+\.[a-zA-Z.]{2,}$/,

    // TODO 3 — Regex password (la plus complexe !)
    // Règle : 8 caractères minimum
    //         au moins 1 minuscule, 1 majuscule, 1 chiffre, 1 caractère spécial
    // Indice : (?=...) = lookahead positif (vérifie sans consommer)
    //          (?=.*[A-Z]) = doit contenir au moins une majuscule quelque part
    // Règle pour le mot de passe :
    // doit avoir au moins 8 caractères,
    // avec au moins 1 minuscule, 1 majuscule, 1 chiffre et 1 symbole spécial
    password: /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^\w\s]).{8,}$/,

};


/* ============================================================
   LES ONGLETS — changer entre "Inscription" et "Connexion"
   Quand on clique sur un onglet, on doit afficher le bon
   formulaire et mettre en surbrillance l'onglet cliqué.
============================================================ */
// TODO 4 — Au clic sur un .tab :
//   1. Retirer la classe "active" de tous les .tab
//   2. Ajouter "active" sur $(this)
//   3. Lire l'attribut data-form avec $(this).data("form")
//   4. Cacher tous les formulaires, afficher le bon avec fadeIn(300)

$(".tab").on("click", function() {
    // On enlève la surbrillance de tous les onglets
    $(".tab").removeClass("active");

    // On met la surbrillance uniquement sur l'onglet qu'on vient de cliquer
    $(this).addClass("active");

    // On lit quel formulaire cet onglet doit afficher
    // (cette info est écrite directement dans le bouton HTML avec data-form="...")
    const target = $(this).data("form");

    // On cache les deux formulaires d'abord...
    $("#signupForm, #loginForm").hide();

    // ...puis on affiche uniquement le bon, avec une animation douce
    $("#" + target).fadeIn(300);
    // FACON MAGIB

});


/* ============================================================
   VÉRIFICATION EN DIRECT — nom d'utilisateur
   Chaque fois que l'utilisateur tape une lettre dans le champ
   "Nom d'utilisateur", on vérifie immédiatement si c'est valide.
============================================================ */
// TODO 5 — Sur l'événement "keyup" de #signup-username :
//   - Récupérer la valeur avec .val()
//   - Tester avec REGEX.username.test(valeur)
//   - Si valide → ajouter classe "ok" sur #f-username, message positif dans .hint
//   - Si invalide → ajouter classe "error", message d'erreur précis dans .hint
//   - Penser à .removeClass("ok error") au début pour reset l'état précédent

$("#signup-username").on("keyup", function() {

    // On récupère ce que l'utilisateur a tapé
    const val = $(this).val();

    // On cible la zone autour du champ (pour changer sa couleur)
    const $field = $("#f-username");

    // On cible le petit texte d'aide sous le champ
    const $hint = $field.find('.hint');

    // On efface les couleurs de validation précédentes (vert ou rouge)
    $field.removeClass('ok error');

    // Si le champ est vide, on remet le message d'aide de base et on s'arrête
    if (val.length === 0) {
        $hint.text('3 à 16 caractères : lettres, chiffres, _ ou -');
        return;
    }

    // On teste si ce qui est tapé respecte la règle du nom d'utilisateur
    if (REGEX.username.test(val)) {
        // C'est valide : on colore en vert et on affiche un message positif
        $field.addClass('ok');
        $hint.text("Nom d'utilisateur valide");
    } else {
        // Ce n'est pas valide : on colore en rouge et on explique l'erreur
        $field.addClass('error');
        $hint.text('Doit contenir 3–16 caractères (lettres, chiffres, _ ou -)');
    }

});


/* ============================================================
   VÉRIFICATION EN DIRECT — email
   Même principe que pour le nom d'utilisateur, mais
   cette fois on vérifie que l'email a le bon format.
============================================================ */
// TODO 6 — Même logique que le username, pour #signup-email
//           Tester avec REGEX.email.test(valeur)
$("#signup-email").on("keyup", function() {

    // On récupère ce que l'utilisateur a tapé dans le champ email
    const val = $(this).val();

    // On cible la zone autour du champ email
    const $field = $("#f-email");

    // On cible le petit texte d'aide sous le champ
    const $hint = $field.find('.hint');

    // On efface les couleurs de validation précédentes
    $field.removeClass('ok error');

    // Si le champ est vide, on remet le message d'aide et on s'arrête
    if (val.length === 0) {
        $hint.text('Format email standard requis');
        return;
    }

    // On teste si l'email ressemble bien à un email valide
    if (REGEX.email.test(val)) {
        // C'est valide : vert + message positif
        $field.addClass('ok');
        $hint.text('Email valide');
    } else {
        // Ce n'est pas valide : rouge + explication
        $field.addClass('error');
        $hint.text('Format invalide, ex: prenom@domaine.com');
    }

});


/* ============================================================
   VÉRIFICATION EN DIRECT — mot de passe + jauge de force
   Chaque fois que l'utilisateur tape dans le champ mot de passe,
   on calcule à quel point son mot de passe est solide,
   et on met à jour la petite barre de force visuelle.
============================================================ */
// TODO 7 — Sur "keyup" de #signup-password :
//   a) Calculer un score de 0 à 4 :
//      +1 si longueur >= 8
//      +1 si contient minuscule ET majuscule
//      +1 si contient un chiffre
//      +1 si contient un caractère spécial
//
//   b) Mettre à jour la jauge .strength span :
//      Utilise .each(function(i){...}) pour boucler sur les 4 spans
//      Si i < score → ajouter la bonne classe (faible / moyen / fort)
//      Sinon retirer toutes les classes
//
//   c) Valider ou invalider le champ avec REGEX.password.test(valeur)

$("#signup-password").on("keyup", function() {

    // On récupère ce que l'utilisateur a tapé
    const val = $(this).val();

    // On cible la zone autour du champ mot de passe
    const $field = $("#f-password");

    // On cible le petit texte d'aide sous le champ
    const $hint = $field.find('.hint');

    // On cible les 4 petits carrés de la barre de force
    const $spans = $field.find('.strength span');

    // On calcule un score entre 0 et 4 selon ce que contient le mot de passe
    let score = 0;

    // +1 point si le mot de passe a au moins 8 caractères
    if (val.length >= 8) score++;

    // +1 point s'il contient à la fois des minuscules et des majuscules
    if (/[a-z]/.test(val) && /[A-Z]/.test(val)) score++;

    // +1 point s'il contient au moins un chiffre
    if (/\d/.test(val)) score++;

    // +1 point s'il contient au moins un symbole spécial (!, @, #, etc.)
    if (/[^A-Za-z0-9]/.test(val)) score++;

    // On met à jour la barre visuelle selon le score obtenu
    // On parcourt les 4 petits carrés un par un (i = 0, 1, 2, 3)
    $spans.each(function(i){
        // On enlève d'abord toutes les couleurs précédentes du carré
        $(this).removeClass('faible moyen fort');

        // Si ce carré doit être allumé (son numéro est inférieur au score)...
        if (i < score) {
            // ...on lui donne la bonne couleur selon le niveau du score
            if (score <= 1) $(this).addClass('faible');      // rouge = très faible
            else if (score <= 3) $(this).addClass('moyen');  // orange = moyen
            else $(this).addClass('fort');                   // vert = fort
        }
        // Sinon le carré reste gris (aucune couleur ajoutée)
    });

    // On efface les couleurs de validation précédentes du champ
    $field.removeClass('ok error');

    // Si le champ est vide, on remet le message d'aide et on s'arrête
    if (val.length === 0) {
        $hint.text('8+ caractères, 1 majuscule, 1 chiffre, 1 spécial');
        return;
    }

    // On vérifie si le mot de passe respecte toutes les règles
    if (REGEX.password.test(val)) {
        // Toutes les règles sont respectées : vert + message positif
        $field.addClass('ok');
        $hint.text('Mot de passe sécurisé');
    } else {
        // Pas encore toutes les règles : rouge + explication
        $field.addClass('error');
        $hint.text('Doit contenir 8+ caractères, 1 majuscule, 1 chiffre et 1 spécial');
    }

});


/* ============================================================
   BOUTON "CRÉER LE COMPTE"
   Quand l'utilisateur clique sur le bouton d'inscription,
   on vérifie que tout est correct avant de créer le compte.
============================================================ */
// TODO 8 — Au clic sur #signupBtn :
//   1. Lire les 3 valeurs (username, email, password)
//   2. Tester les 3 regex
//   3. Si erreurs → collecter dans un tableau, shake sur le bouton,
//      afficher dans #signupFlash (classe "err") avec .slideDown(300)
//   4. Si tout OK → stocker dans registeredUser = { username, email, password }
//      Afficher message succès dans #signupFlash (classe "ok")
//      Après 800ms, appeler doLogin()

$("#signupBtn").on("click", function() {

    // On récupère ce que l'utilisateur a tapé dans les trois champs
    // .trim() enlève les espaces inutiles au début et à la fin
    const username = $("#signup-username").val().trim();
    const email = $("#signup-email").val().trim();
    const password = $("#signup-password").val();

    // On cible la zone où on affichera les messages d'erreur ou de succès
    const $flash = $("#signupFlash");

    // On prépare une liste vide qui contiendra les erreurs trouvées
    const errors = [];

    // On cache et vide le message précédent (si il y en avait un)
    $flash.hide().removeClass('ok err').text('');

    // On vérifie chaque champ et on ajoute un message d'erreur si nécessaire
    if (!REGEX.username.test(username)) {
        errors.push("Nom d'utilisateur invalide");
    }
    if (!REGEX.email.test(email)) {
        errors.push('Email invalide');
    }
    if (!REGEX.password.test(password)) {
        errors.push('Mot de passe non conforme');
    }

    // S'il y a au moins une erreur dans la liste...
    if (errors.length > 0) {
        // On fait trembler le bouton pour attirer l'attention sur l'erreur
        $(this).addClass('shake');
        // Après 500 millisecondes (0.5 seconde), on arrête le tremblement
        setTimeout(() => $(this).removeClass('shake'), 500);
        // On affiche toutes les erreurs en rouge, avec une animation de glissement
        $flash.addClass('err').html(errors.join('<br>')).slideDown(300);
        // On s'arrête ici, on ne crée pas le compte
        return;
    }

    // Tout est valide ! On enregistre les infos du nouvel utilisateur en mémoire
    registeredUser = { username, email, password };

    // On affiche un message de succès en vert
    $flash.addClass('ok').text('Compte créé avec succès !').slideDown(300);

    // On attend 0.8 seconde avant de connecter l'utilisateur
    // pour qu'il ait le temps de lire le message de succès
    setTimeout(() => {
        doLogin();
    }, 800);

});


/* ============================================================
   BOUTON "SE CONNECTER"
   Quand l'utilisateur clique sur le bouton de connexion,
   on vérifie que l'email et le mot de passe correspondent
   bien au compte qui a été créé.
============================================================ */
// TODO 9 — Au clic sur #loginBtn :
//   1. Vérifier que registeredUser existe (sinon → message "inscris-toi d'abord")
//   2. Vérifier que l'email est valide (REGEX.email)
//   3. Comparer email + password avec registeredUser.email / .password
//   4. Si OK → appeler doLogin()
//   5. Sinon → shake + flash "err"

$("#loginBtn").on("click", function() {

    // On récupère ce que l'utilisateur a tapé dans les champs de connexion
    const email = $("#login-email").val().trim();
    const password = $("#login-password").val();

    // On cible la zone où afficher les messages
    const $flash = $("#loginFlash");

    // On cache et vide le message précédent
    $flash.hide().removeClass('ok err').text('');

    // On vérifie d'abord qu'un compte a bien été créé avant d'essayer de se connecter
    if (!registeredUser) {
        $flash.addClass('err').text('Inscris-toi d\'abord').slideDown(300);
        $(this).addClass('shake');
        setTimeout(() => $(this).removeClass('shake'), 500);
        return;
    }

    // On vérifie que l'email tapé a bien le bon format
    if (!REGEX.email.test(email)) {
        $flash.addClass('err').text('Email invalide').slideDown(300);
        $(this).addClass('shake');
        setTimeout(() => $(this).removeClass('shake'), 500);
        return;
    }

    // On compare l'email et le mot de passe tapés avec ceux enregistrés lors de l'inscription
    if (email === registeredUser.email && password === registeredUser.password) {
        // Tout correspond : on connecte l'utilisateur
        doLogin();
    } else {
        // L'email ou le mot de passe ne correspond pas : on affiche une erreur
        $flash.addClass('err').text('Email ou mot de passe incorrect').slideDown(300);
        $(this).addClass('shake');
        setTimeout(() => $(this).removeClass('shake'), 500);
    }

});


/* ============================================================
   CONNEXION / DÉCONNEXION — logique fournie, ne pas modifier
============================================================ */

// Cette fonction affiche la page de bienvenue après une connexion réussie.
// Elle fait disparaître le formulaire et apparaître le message de bienvenue.
function doLogin() {
    // On fait disparaître la boîte de connexion avec une animation
    $("#authBox").fadeOut(400, function() {
        // Une fois cachée, on prépare le message de bienvenue avec le nom de l'utilisateur
        const msg = "Bienvenue <strong>" + registeredUser.username + "</strong> ! Tu es connecté·e.";
        // On met ce message dans la zone prévue à cet effet
        $("#welcomeMsg").html(msg);
        // On fait apparaître la page de bienvenue avec une animation
        $("#welcome").fadeIn(400);
    });
}

// Quand on clique sur le bouton "Se déconnecter"...
$("#logoutBtn").on("click", function() {
    // On fait disparaître la page de bienvenue avec une animation
    $("#welcome").fadeOut(400, function() {
        // Une fois cachée, on vide les champs de connexion (email et mot de passe)
        $("#login-email, #login-password").val("");
        // On cache tous les messages d'erreur ou de succès encore visibles
        $(".flash").hide();
        // On simule un clic sur le premier onglet pour revenir au formulaire d'inscription
        $(".tab").first().trigger("click");
        // On fait réapparaître la boîte de connexion/inscription
        $("#authBox").fadeIn(400);
    });
});

</script>

<!--
============================================================
  GUIDE DES MÉTHODES JQUERY UTILISÉES DANS CE FICHIER
============================================================

--- $() — LE SÉLECTEUR JQUERY ---
  Base de tout. Transforme un élément HTML en objet jQuery.
  $("#signup-username")         → sélectionne par ID
  $(".tab")                     → sélectionne par classe CSS (tous les .tab)
  $("#signupForm, #loginForm")  → plusieurs éléments à la fois


--- .on("evenement", function) — ÉCOUTER UN ÉVÉNEMENT ---
  Attend qu'un truc se passe et exécute une fonction.
  $(".tab").on("click", function() { ... })           → au clic
  $("#signup-username").on("keyup", function() { ... }) → à chaque touche relâchée
  "keyup" = touche relâchée  |  "click" = clic souris


--- .data("nom") — LIRE UN ATTRIBUT data-* ---
  Lit une valeur stockée dans le HTML avec data-quelquechose="valeur".
  HTML  : <button class="tab" data-form="signupForm">Inscription</button>
  JS    : const form = $(this).data("form");  →  form vaut "signupForm"


--- .hide() / .show() / .fadeIn() / .fadeOut() — AFFICHER / CACHER ---
  .hide()        → cache instantanément (display: none)
  .show()        → affiche instantanément
  .fadeOut(400)  → cache avec fondu en 400ms
  .fadeIn(400)   → affiche avec fondu en 400ms
  Ex : $("#authBox").fadeOut(400, function() {  → le 2e argument est un callback
           $("#welcome").fadeIn(400);           → exécuté une fois l'animation finie
       });


--- .slideDown(300) — APPARITION PAR GLISSEMENT ---
  Fait apparaître un élément en déroulant vers le bas en 300ms.
  Ex : $flash.slideDown(300);  → affiche le message d'erreur en glissant


--- .addClass() / .removeClass() — AJOUTER / RETIRER DES CLASSES CSS ---
  Permet de changer le style d'un élément dynamiquement.
  $(".tab").removeClass("active")  → enlève "active" de tous les onglets
  $(this).addClass("active")       → ajoute "active" sur l'onglet cliqué
  $field.addClass('ok')            → colore le champ en vert (défini dans style.css)
  $field.addClass('error')         → colore le champ en rouge
  $(this).addClass('shake')        → fait trembler le bouton (animation CSS)


--- .val() — LIRE OU MODIFIER LA VALEUR D'UN CHAMP ---
  Lit ce que l'utilisateur a tapé dans un <input>.
  const val = $(this).val();                   → lit la valeur
  $("#login-email").val("");                   → vide le champ


--- .text("contenu") / .html("contenu") — MODIFIER LE TEXTE ---
  .text("abc")         → écrit du texte pur (les balises HTML sont ignorées)
  .html("<b>abc</b>")  → écrit du HTML (les balises sont interprétées)
  Ex : $hint.text("Nom d'utilisateur valide");
       $flash.html(errors.join('<br>'));          → <br> interprété = saut de ligne
       $("#welcomeMsg").html("Bienvenue <strong>Jean</strong>");


--- .find(".classe") — CHERCHER À L'INTÉRIEUR ---
  Cherche un élément enfant à l'intérieur d'un autre.
  const $field = $("#f-username");
  const $hint  = $field.find('.hint');          → le .hint dans #f-username
  const $spans = $field.find('.strength span'); → les <span> dans .strength


--- .each(function(i) {...}) — BOUCLE SUR PLUSIEURS ÉLÉMENTS ---
  Parcourt chaque élément sélectionné un par un. i = numéro (0, 1, 2...).
  $spans.each(function(i) {
      $(this).removeClass('faible moyen fort');
      if (i < score) { ... }  → allume le carré selon le score
  });


--- .trigger("evenement") — SIMULER UN ÉVÉNEMENT ---
  Déclenche un événement comme si l'utilisateur l'avait fait lui-même.
  $(".tab").first().trigger("click");  → simule un clic sur le premier onglet
  .first()  → récupère uniquement le premier élément parmi tous les .tab


--- $(this) — L'ÉLÉMENT QUI A DÉCLENCHÉ L'ÉVÉNEMENT ---
  Dans un .on("click", function() { ... }), this = l'élément cliqué.
  $(".tab").on("click", function() {
      $(this).addClass("active");  → seul l'onglet cliqué reçoit "active"
  });


--- LE CHAÎNAGE — .hide().removeClass().text() ---
  jQuery permet d'enchaîner les méthodes car chacune retourne l'objet jQuery.
  $flash.hide().removeClass('ok err').text('');
    → 1. cache $flash
    → 2. enlève les classes 'ok' et 'err'
    → 3. vide son texte
    tout sur la même ligne, dans l'ordre

============================================================
